<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitLab Flow CLI</title>
  <desc id="desc">Banner do projeto GitLab Flow CLI com visual de terminal e cartões de fluxo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1B16"/>
      <stop offset="1" stop-color="#182B23"/>
    </linearGradient>
    <linearGradient id="card" x1="110" y1="78" x2="1078" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16352A"/>
      <stop offset="1" stop-color="#0F241D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="shadow" x="70" y="50" width="1060" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="76" r="130" fill="#2C5B46" fill-opacity="0.22"/>
  <circle cx="136" cy="368" r="112" fill="#254636" fill-opacity="0.24"/>

  <g filter="url(#shadow)">
    <rect x="100" y="80" width="1000" height="260" rx="24" fill="url(#card)" stroke="#315C49"/>
  </g>

  <rect x="100" y="80" width="1000" height="44" rx="24" fill="#11231C"/>
  <circle cx="136" cy="102" r="6" fill="#FF5F57"/>
  <circle cx="156" cy="102" r="6" fill="#FEBC2E"/>
  <circle cx="176" cy="102" r="6" fill="#28C840"/>

  <text x="600" y="108" text-anchor="middle" fill="#A7C7B7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">gl-work terminal flow</text>

  <text x="150" y="175" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">GitLab Flow CLI</text>
  <text x="150" y="214" fill="#C4DDD1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Menos passo manual. Mais consistência no fluxo.</text>

  <g>
    <rect x="150" y="248" width="164" height="40" rx="999" fill="#203A2F"/>
    <text x="232" y="273" text-anchor="middle" fill="#EAF5EF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Issue → Branch</text>
    <rect x="330" y="248" width="182" height="40" rx="999" fill="#203A2F"/>
    <text x="421" y="273" text-anchor="middle" fill="#EAF5EF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Branch → MR</text>
    <rect x="528" y="248" width="196" height="40" rx="999" fill="#203A2F"/>
    <text x="626" y="273" text-anchor="middle" fill="#EAF5EF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">MR → Review</text>
  </g>

  <g>
    <rect x="765" y="158" width="255" height="132" rx="18" fill="#0F1B17" stroke="#355B4B"/>
    <text x="790" y="191" fill="#F59E0B" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">$ gl-work start</text>
    <text x="790" y="221" fill="#D8E9E0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">Issue criado: #42</text>
    <text x="790" y="247" fill="#D8E9E0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">Branch criada:</text>
    <text x="790" y="270" fill="#FCD34D" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">feat(#42)/login-sso</text>
  </g>

  <path d="M726 270C742 270 749 270 764 270" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
</svg>
